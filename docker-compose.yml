version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.railway
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: node:18-alpine
    working_dir: /app/voxcivica_app
    ports:
      - "3000:3000"
    volumes:
      - ./voxcivica_app:/app/voxcivica_app
    environment:
      - REACT_APP_API_URL=http://backend:8000
    command: sh -c "npm install && npm start"

volumes:
  backend_cache:
    driver: local

networks:
  default:
    name: voxcivica_network
    driver: bridge
